<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IsatPhone Balance Check</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 30px auto; }
    label, input, button { display: block; margin-bottom: 8px; }
    input, button { width: 100%; padding: 8px; }
    #result { margin-top: 15px; padding: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h2>IsatPhone / SIM Balance Check</h2>
  <label for="number">Enter SIM or IsatPhone number:</label>
  <input type="text" id="number" placeholder="e.g. 870XXXXXXX" required />
  <button onclick="checkBalance()">Check Balance</button>
  <div id="result"></div>

  <script>
    async function checkBalance() {
      const number = document.getElementById("number").value.trim();
      const resultEl = document.getElementById("result");

      if (!number) {
        resultEl.innerHTML = "Please enter a number.";
        return;
      }

      resultEl.innerHTML = "Checking...";

      try {
        const response = await fetch("https://gavmag.pythonanywhere.com/check-balance", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ number }),
        });

        const data = await response.json();

        if (data.error) {
          resultEl.innerHTML = "Error: " + data.error;
        } else {
          resultEl.innerHTML = `
            <p><strong>Balance:</strong> ${data.balance}</p>
            <p><strong>Expiry:</strong> ${data.expiry}</p>
          `;
        }
      } catch (err) {
        resultEl.innerHTML = "Error connecting to server.";
      }
    }
  </script>
</body>
</html>
